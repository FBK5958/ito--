<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オンライン ito風カードゲーム</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    text-align: center;
  }
  header {
    padding: 10px 0;
    background: linear-gradient(90deg, #ff7b7b, #ffd56b);
    color: #222;
    font-weight: bold;
    margin-bottom: 20px;
  }
  .panel {
    background: #1c1c1c;
    border-radius: 12px;
    padding: 15px;
    margin: 10px auto;
    max-width: 700px;
    box-shadow: 0 0 10px #000;
  }
  input, select, button {
    padding: 6px 10px;
    margin: 4px;
    border-radius: 6px;
    border: none;
    outline: none;
  }
  input, select {
    background: #222;
    color: #eee;
  }
  button {
    background: #ff7b7b;
    color: #222;
    font-weight: bold;
    cursor: pointer;
  }
  button:hover {
    background: #ffd56b;
  }
  .card {
    width: 70px;
    height: 100px;
    border-radius: 10px;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    margin: 6px;
    background: #444;
    color: #fff;
    box-shadow: 0 0 5px #000;
  }
  .card.revealed {
    background: #fff;
    color: #000;
  }
  .submit-list span {
    display: inline-block;
    margin: 4px 6px;
    padding: 4px 8px;
    border-radius: 6px;
    background: #333;
    font-size: 14px;
  }
  .card-img-small {
    width: 40px;
    height: auto;
    vertical-align: middle;
    margin-right: 6px;
    border-radius: 6px;
    box-shadow: 0 0 4px #000;
  }
</style>
</head>

<body>
<header>オンライン ito風カードゲーム</header>

<div class="panel" id="roomPanel">
  <h2>部屋設定</h2>

  <p>部屋ID：<input id="roomId"></p>
  <p>あなたの名前：<input id="playerName"></p>

  <p>
    人数：
    <select id="players">
      <option value="2">2人</option>
      <option value="3">3人</option>
      <option value="4" selected>4人</option>
      <option value="5">5人</option>
      <option value="6">6人</option>
    </select>
  </p>

  <p>
    カード枚数：
    <select id="cardCount">
      <option value="2">2枚</option>
      <option value="3" selected>3枚</option>
    </select>
  </p>

  <button id="joinBtn">部屋に参加 / 作成</button>
  <button id="dealBtn" disabled>カードを配る（ホストのみ）</button>
</div>

<div class="panel" id="memberPanel" style="display:none;">
  <h2>参加者一覧</h2>
  <ul id="memberList"></ul>
</div>

<div class="panel" id="infoPanel">
  <h2>状態</h2>
  <div id="status">部屋に参加していません</div>
</div>

<div class="panel" id="handsPanel">
  <h2>手札</h2>
  <div id="handsView"></div>
  <div id="handCards"></div>
</div>

<div class="panel" id="submitPanel">
  <h2>提出</h2>
  <div id="submitButtons"></div>
  <div class="submit-list" id="submitList"></div>
</div>

<div class="panel" id="resultPanel">
  <h2>結果</h2>
  <div id="resultCards"></div>
  <div id="finalResult"></div>
</div>
